<div class="min-h-screen bg-slate-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
  
  <!-- Animated Background Gradients -->
  <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-brand-600/30 blur-[120px] animate-pulse"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="flex justify-center text-brand-400 font-bold text-5xl mb-6">
      <i class="fa-solid fa-code drop-shadow-[0_0_15px_rgba(249,115,22,0.5)]"></i>
    </div>
    <h2 class="mt-2 text-center text-3xl font-bold text-white tracking-tight">
      Create an account
    </h2>
    <p class="mt-2 text-center text-sm text-slate-400">
      Already have an account?
      <a routerLink="/login" class="font-medium text-brand-400 hover:text-brand-300 transition-colors">
        Log in instead
      </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <!-- Glassmorphism Card -->
    <div class="bg-white/10 backdrop-blur-xl py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border border-white/20">
      <form class="space-y-5" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        
        <!-- Error Message Alert -->
        <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/50 p-4 mb-4 rounded-xl backdrop-blur-md">
          <div class="flex items-center">
            <div class="flex-shrink-0">
              <i class="fa-solid fa-circle-exclamation text-red-400"></i>
            </div>
            <div class="ml-3">
              <p class="text-sm text-red-200">{{ errorMessage }}</p>
            </div>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">
            Email address
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fa-regular fa-envelope text-slate-400 group-focus-within:text-brand-400 transition-colors"></i>
            </div>
            <input id="email" type="email" formControlName="email" autocomplete="email" required
              class="appearance-none block w-full pl-10 pr-3 py-2.5 bg-slate-900/50 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 focus:bg-slate-900/80 transition-all sm:text-sm"
              [ngClass]="{'border-red-500/50 focus:ring-red-500/50': signupForm.get('email')?.invalid && signupForm.get('email')?.touched}"
              placeholder="you@example.com">
          </div>
          <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched" class="mt-1.5 text-xs text-red-400">
            Please enter a valid email address.
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">
            Password
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fa-solid fa-lock text-slate-400 group-focus-within:text-brand-400 transition-colors"></i>
            </div>
            <input id="password" type="password" formControlName="password" autocomplete="new-password" required
              class="appearance-none block w-full pl-10 pr-3 py-2.5 bg-slate-900/50 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 focus:bg-slate-900/80 transition-all sm:text-sm"
              [ngClass]="{'border-red-500/50 focus:ring-red-500/50': signupForm.get('password')?.invalid && signupForm.get('password')?.touched}"
              placeholder="••••••••">
          </div>
          <div *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched" class="mt-1.5 text-xs text-red-400">
            Password must be at least 6 characters.
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-slate-300 mb-1.5">
            Confirm Password
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fa-solid fa-lock-open text-slate-400 group-focus-within:text-brand-400 transition-colors"></i>
            </div>
            <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" required
              class="appearance-none block w-full pl-10 pr-3 py-2.5 bg-slate-900/50 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 focus:bg-slate-900/80 transition-all sm:text-sm"
              [ngClass]="{'border-red-500/50 focus:ring-red-500/50': signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched}"
              placeholder="••••••••">
          </div>
          <div *ngIf="signupForm.get('confirmPassword')?.hasError('required') && signupForm.get('confirmPassword')?.touched" class="mt-1.5 text-xs text-red-400">
            Please confirm your password.
          </div>
          <div *ngIf="signupForm.get('confirmPassword')?.hasError('passwordMismatch') && signupForm.get('confirmPassword')?.touched" class="mt-1.5 text-xs text-red-400">
            Passwords do not match.
          </div>
        </div>

        <div class="pt-4">
          <button type="submit" [disabled]="isLoading"
            class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-[0_0_15px_rgba(249,115,22,0.3)] text-sm font-bold text-white bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-brand-500 hover:-translate-y-0.5 transition-all disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none">
            <span *ngIf="isLoading"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Creating account...</span>
            <span *ngIf="!isLoading">Create account</span>
          </button>
        </div>
      </form>

      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-white/10"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-slate-900/50 backdrop-blur-md text-slate-400 rounded-full">
              Or continue with
            </span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
          <button type="button" (click)="loginWithGoogle()" [disabled]="isLoading"
            class="w-full inline-flex justify-center items-center py-2.5 px-4 rounded-xl border border-white/10 bg-slate-800/50 text-sm font-medium text-slate-300 hover:bg-slate-700/50 hover:text-white hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-white/20">
            <i class="fa-brands fa-google mr-2 text-[#DB4437]"></i>
            <span class="sr-only">Sign in with Google</span>
            Google
          </button>

          <button type="button" (click)="loginWithGitHub()" [disabled]="isLoading"
            class="w-full inline-flex justify-center items-center py-2.5 px-4 rounded-xl border border-white/10 bg-slate-800/50 text-sm font-medium text-slate-300 hover:bg-slate-700/50 hover:text-white hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-white/20">
            <i class="fa-brands fa-github mr-2 text-white"></i>
            <span class="sr-only">Sign in with GitHub</span>
            GitHub
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
